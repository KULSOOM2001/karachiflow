<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zone Status — KarachiFlow</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .zone-overview {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 40px;
    }
    .severity-legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      font-size: 13px;
      color: var(--text2);
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    .calm-zones {
      margin-top: 40px;
      padding-top: 32px;
      border-top: 1px solid var(--border);
    }
    .calm-grid {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .calm-tag {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(61,220,132,0.08);
      border: 1px solid rgba(61,220,132,0.15);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 13px;
      color: var(--green2);
    }
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 16px;
      padding: 28px;
      max-width: 480px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .modal-title {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>
  <div class="container">
    <div class="page-header">
      <h1 class="page-title">🗺️ Zone Status</h1>
      <p class="page-sub">Real-time severity map of all Karachi areas — tap any zone for details</p>
    </div>

    <div class="severity-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--critical)"></div> Critical (20+ votes)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--high)"></div> High (10–19 votes)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--medium)"></div> Medium (5–9 votes)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--low)"></div> Low (&lt;5 votes)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--text3)"></div> No reports</div>
    </div>

    <div class="zone-overview" id="zoneGrid">
    </div>

    <div class="calm-zones">
      <div class="section-title">Zones with no active issues</div>
      <div class="calm-grid" id="calmZones"></div>
    </div>
  </div>

  <!-- Zone Detail Modal -->
  <div class="modal-overlay" id="zoneModal" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Zone Name</div>
        <button onclick="closeModal()" class="btn btn-ghost btn-sm">✕ Close</button>
      </div>
      <div id="modalStats" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px"></div>
      <div class="section-title">Active Reports</div>
      <div id="modalReports" style="display:flex;flex-direction:column;gap:10px;margin-top:10px"></div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    // Check if refresh - logout
    const navEntry = performance.getEntriesByType('navigation')[0];
    if (navEntry && navEntry.type === 'reload' && sessionStorage.getItem('kf_role')) {
      sessionStorage.clear();
      window.location.replace('/');
    }
    // Check if logged in
    if (!sessionStorage.getItem('kf_role')) {
      window.location.replace('/');
    }

    document.getElementById('nav-placeholder').innerHTML = buildNav('zones');
    initLangToggle();

    let zoneData = {};
    let allReports = [];

    function getSeverityClass(votes) {
      if (votes >= 20) return 'severity-critical';
      if (votes >= 10) return 'severity-high';
      if (votes >= 5) return 'severity-medium';
      return 'severity-low';
    }

    function getSeverityColor(votes) {
      if (votes >= 20) return 'var(--critical)';
      if (votes >= 10) return 'var(--high)';
      if (votes >= 5) return 'var(--medium)';
      return 'var(--low)';
    }

    function renderZoneCard(zone, data) {
      const sev = getSeverityClass(data.totalVotes);
      const color = getSeverityColor(data.totalVotes);
      const lsCount = data.loadShedding || 0;
      const wsCount = data.waterShortage || 0;
      return `
        <div class="zone-card ${sev}" onclick="openZoneModal('${zone}')">
          <div class="zone-name">${zone}</div>
          <div class="zone-indicators">
            ${lsCount > 0 ? `<div class="zone-indicator"><div class="zone-dot" style="background:var(--yellow)"></div> ⚡${lsCount}</div>` : ''}
            ${wsCount > 0 ? `<div class="zone-indicator"><div class="zone-dot" style="background:var(--blue)"></div> 💧${wsCount}</div>` : ''}
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between">
            <span style="font-size:11px;color:var(--text3)">${data.totalReports} report${data.totalReports !== 1 ? 's' : ''}</span>
            <span style="font-size:11px;font-weight:600;color:${color}">${data.totalVotes} votes</span>
          </div>
          <div style="background:var(--bg3);border-radius:3px;height:3px;margin-top:8px">
            <div style="background:${color};height:3px;border-radius:3px;width:${Math.min(100, Math.round(data.totalVotes/30*100))}%;transition:width 0.6s"></div>
          </div>
        </div>
      `;
    }

    async function loadZones() {
      try {
        const [zonesRes, reportsRes] = await Promise.all([
          fetch('/api/reports/zones'),
          fetch('/api/reports')
        ]);
        const zonesData = await zonesRes.json();
        const reportsData = await reportsRes.json();

        if (zonesData.success) {
          const activeZones = new Set();
          zonesData.zones.forEach(z => {
            zoneData[z._id] = z;
            activeZones.add(z._id);
          });
          allReports = reportsData.reports || [];

          const grid = document.getElementById('zoneGrid');
          const sorted = zonesData.zones.sort((a, b) => b.totalVotes - a.totalVotes);
          grid.innerHTML = sorted.map(z => renderZoneCard(z._id, z)).join('');

          const calmZones = ZONES.filter(z => !activeZones.has(z));
          const calmContainer = document.getElementById('calmZones');
          if (calmZones.length > 0) {
            calmContainer.innerHTML = calmZones.map(z =>
              `<div class="calm-tag">✅ ${z}</div>`
            ).join('');
          } else {
            calmContainer.innerHTML = '<p style="color:var(--text3);font-size:13px">All zones have active reports.</p>';
          }
        }
      } catch (e) {
        const grid = document.getElementById('zoneGrid');
        grid.innerHTML = '<p style="color:var(--text3);padding:20px">Connect the backend to see live zone data.</p>';
        document.getElementById('calmZones').innerHTML = ZONES.map(z =>
          `<div class="calm-tag">✅ ${z}</div>`
        ).join('');
      }
    }

    function openZoneModal(zone) {
      const data = zoneData[zone];
      if (!data) return;
      document.getElementById('modalTitle').textContent = `📍 ${zone}`;
      document.getElementById('modalStats').innerHTML = `
        <div class="card" style="text-align:center">
          <div style="font-family:var(--font-display);font-size:24px;font-weight:800;color:var(--accent)">${data.totalReports}</div>
          <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Reports</div>
        </div>
        <div class="card" style="text-align:center">
          <div style="font-family:var(--font-display);font-size:24px;font-weight:800;color:var(--yellow)">${data.loadShedding || 0}</div>
          <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Load Shed</div>
        </div>
        <div class="card" style="text-align:center">
          <div style="font-family:var(--font-display);font-size:24px;font-weight:800;color:var(--blue)">${data.waterShortage || 0}</div>
          <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Water</div>
        </div>
      `;
      const zoneReports = allReports.filter(r => r.zone === zone);
      document.getElementById('modalReports').innerHTML = zoneReports.length
        ? zoneReports.map(r => renderReportCard(r)).join('')
        : '<p style="color:var(--text3);font-size:13px">No detailed reports available.</p>';
      document.getElementById('zoneModal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('zoneModal').classList.remove('open');
    }

    loadZones();
    setInterval(loadZones, 45000);
  </script>
</body>
</html>
